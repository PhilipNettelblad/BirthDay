<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Födelsedags Countdown</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #140014, #2a0033, #000);
      color: #fff;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
    }

    h1 {
      font-size: 2.8rem;
      color: #ffccff;
      text-shadow:
        0 0 5px #ff66ff,
        0 0 20px #ff00ff,
        0 0 40px #9900ff;
      margin-bottom: 2rem;
      animation: glitch 2s infinite;
      text-align: center;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(-2px, -2px); }
      100% { transform: translate(0); }
    }

    #countdown {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .box {
      background: rgba(0,0,0,0.6);
      border: 2px solid #ff4dff;
      padding: 1.2rem 1.5rem;
      border-radius: 12px;
      text-align: center;
      box-shadow:
        0 0 10px #ff00ff,
        inset 0 0 10px #9900ff;
      animation: pulse 2s infinite;
      min-width: 100px;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 10px #ff00ff; }
      50% { box-shadow: 0 0 25px #00ffff; }
      100% { box-shadow: 0 0 10px #ff00ff; }
    }

    .box div {
      font-size: 2.2rem;
    }

    .box span {
      font-size: 0.75rem;
      color: #ccc;
      letter-spacing: 2px;
    }

    #message {
      margin-top: 2rem;
      font-size: 1.5rem;
      color: #ffccff;
      text-shadow: 0 0 10px #ff00ff;
      text-align: center;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.8rem;
      color: #777;
    }
  </style>
</head>

<body>

  <h1>🎉 FÖDELSEDAGS COUNTDOWN 🎂</h1>

  <div id="countdown">
    <div class="box"><div id="days">00</div><span>DAGAR</span></div>
    <div class="box"><div id="hours">00</div><span>TIMMAR</span></div>
    <div class="box"><div id="minutes">00</div><span>MIN</span></div>
    <div class="box"><div id="seconds">00</div><span>SEK</span></div>
  </div>

  <div id="message"></div>

  <footer>Birthday system online...</footer>

<script>
const friends = [
  { name: "Anna", month: 1, day: 12 },
  { name: "Erik", month: 2, day: 3 },
  { name: "Sara", month: 3, day: 18 },
  { name: "Johan", month: 5, day: 9 },
  { name: "Maja", month: 6, day: 22 },
  { name: "Lukas", month: 8, day: 14 },
  { name: "Elin", month: 10, day: 2 },
  { name: "Oscar", month: 12, day: 28 }
];

function getNext(now) {
  const year = now.getFullYear();

  let list = friends.map(f => {
    let d = new Date(year, f.month - 1, f.day);
    if (d < now) d = new Date(year + 1, f.month - 1, f.day);
    return { ...f, date: d };
  });

  list.sort((a,b) => a.date - b.date);
  return list[0];
}

function update() {
  const now = new Date();
  const hour = now.getHours();
  const minute = now.getMinutes();

  const today = friends.find(f =>
    f.month === now.getMonth() + 1 &&
    f.day === now.getDate()
  );

  const msg = document.getElementById("message");

  if (hour === 8 && minute === 15) {
    if (today) {
      msg.innerHTML = `🎉 IDAG FYLLER <b>${today.name}</b> ÅR 🎂`;
    } else {
      msg.innerHTML = `Ingen fyller år idag`;
    }

    document.getElementById("countdown").style.display = "none";
    return;
  } else {
    document.getElementById("countdown").style.display = "flex";
  }

  const next = getNext(now);
  msg.innerHTML = `Nästa upp: ${next.name}`;

  const diff = next.date - now;

  document.getElementById("days").textContent = Math.floor(diff / (1000*60*60*24));
  document.getElementById("hours").textContent = Math.floor((diff / (1000*60*60)) % 24);
  document.getElementById("minutes").textContent = Math.floor((diff / (1000*60)) % 60);
  document.getElementById("seconds").textContent = Math.floor((diff / 1000) % 60);
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
