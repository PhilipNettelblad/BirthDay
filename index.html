<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday System</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(135deg, #140014, #2a0033, #000);
    color: #fff;
    overflow: hidden;
    padding: 20px;
    text-align: center;
  }

  body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.03),
      rgba(255,255,255,0.03) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }

  h1 {
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    color: #ffccff;
    text-shadow: 0 0 5px #ff66ff, 0 0 20px #ff00ff, 0 0 40px #9900ff;
    margin-bottom: 2rem;
    animation: glitch 2s infinite;
  }

  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(-2px, -2px); }
    100% { transform: translate(0); }
  }

  #countdown {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 600px;
  }

  .box {
    background: rgba(0,0,0,0.6);
    border: 2px solid #ff4dff;
    padding: 1rem;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 10px #ff00ff, inset 0 0 10px #9900ff;
    animation: pulse 2s infinite;
    flex: 1 1 120px;
    min-width: 100px;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 10px #ff00ff; }
    50% { box-shadow: 0 0 25px #00ffff; }
    100% { box-shadow: 0 0 10px #ff00ff; }
  }

  .box div {
    font-size: clamp(1.5rem, 6vw, 2.2rem);
  }

  .box span {
    font-size: 0.7rem;
    color: #ccc;
    letter-spacing: 2px;
  }

  #message {
    margin-top: 2rem;
    font-size: clamp(1rem, 4vw, 1.5rem);
    color: #ffccff;
    text-shadow: 0 0 10px #ff00ff;
    min-height: 40px;
  }

  /* 🔧 HEMLIG DEBUG-KNAPP */
  #debugReveal {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 10px;
    height: 10px;
    opacity: 0.02;
    background: transparent;
    border: none;
    cursor: pointer;
  }

  @media (max-width: 480px) {
    #countdown {
      gap: 0.6rem;
    }

    .box {
      padding: 0.8rem;
    }
  }
</style>
</head>

<body>

<h1>🎂 BIRTHDAY SYSTEM 🎉</h1>

<div id="countdown">
  <div class="box"><div id="days">00</div><span>DAGAR</span></div>
  <div class="box"><div id="hours">00</div><span>TIMMAR</span></div>
  <div class="box"><div id="minutes">00</div><span>MIN</span></div>
  <div class="box"><div id="seconds">00</div><span>SEK</span></div>
</div>

<div id="message"></div>

<!-- 🔧 HIDDEN BUTTON -->
<button id="debugReveal"></button>

<script>
const friends = [
  { name: "Ludvig", month: 1, day: 31 },
  { name: "Pontus", month: 4, day: 10 },
  { name: "Philip", month: 3, day: 11 },
  { name: "Daniel", month: 6, day: 26 },
  { name: "Jonathan", month: 7, day: 29 },
  { name: "Douglas", month: 5, day: 19 },
  { name: "Hanno", month: 1, day: 1 },
  { name: "Håkan", month: 5, day: 8 },
  { name: "Sebastian", month: 10, day: 8 },
  { name: "Tony", month: 6, day: 7 },
  { name: "Felix", month: 5, day: 22 },
  { name: "Malin", month: 11, day: 2 },
  { name: "Nike", month: 9, day: 19 },
  { name: "Christoffer", month: 8, day: 31 },
  { name: "Simon", month: 10, day: 21 }
];

function getNextEvent(now) {
  const year = now.getFullYear();

  let list = friends.map(f => {
    let d = new Date(year, f.month - 1, f.day, 8, 15, 0);
    if (d < now) d = new Date(year + 1, f.month - 1, f.day, 8, 15, 0);
    return { ...f, date: d };
  });

  list.sort((a,b) => a.date - b.date);
  return list[0];
}

function forceReveal() {
  const now = new Date();

  const today = friends.find(f =>
    f.month === now.getMonth() + 1 &&
    f.day === now.getDate()
  );

  const msg = document.getElementById("message");

  if (today) {
    msg.innerHTML = `🎉 ${today.name} fyller år idag 🎂`;
  }
}

function update() {
  const now = new Date();
  const msg = document.getElementById("message");

  const next = getNextEvent(now);

  const today = friends.find(f =>
    f.month === now.getMonth() + 1 &&
    f.day === now.getDate()
  );

  const revealTime = new Date(
    now.getFullYear(),
    now.getMonth(),
    now.getDate(),
    8, 15, 0
  );

  if (today && now >= revealTime && now < new Date(revealTime.getTime() + 24*60*60*1000)) {
    msg.innerHTML = `🎉 ${today.name} fyller år idag 🎂`;
  } else {
    msg.innerHTML = "";
  }

  const diff = next.date - now;

  document.getElementById("days").textContent = Math.floor(diff / (1000*60*60*24));
  document.getElementById("hours").textContent = Math.floor((diff / (1000*60*60)) % 24);
  document.getElementById("minutes").textContent = Math.floor((diff / (1000*60)) % 60);
  document.getElementById("seconds").textContent = Math.floor((diff / 1000) % 60);
}

setInterval(update, 1000);
update();

/* 🔧 bind hidden button */
document.getElementById("debugReveal").addEventListener("click", forceReveal);
</script>

</body>
</html>
