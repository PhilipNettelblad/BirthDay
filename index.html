<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday System</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:'Orbitron',sans-serif;
  background:linear-gradient(135deg,#140014,#2a0033,#000);
  color:#fff;
  overflow:hidden;
  padding:20px;
  text-align:center;
}

body::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

h1{
  font-size:clamp(1.6rem,5vw,2.8rem);
  color:#ffccff;
  text-shadow:0 0 5px #ff66ff,0 0 20px #ff00ff,0 0 40px #9900ff;
  margin-bottom:2rem;
}

#countdown{
  display:flex;
  gap:1rem;
  flex-wrap:wrap;
  justify-content:center;
  max-width:600px;
}

.box{
  background:rgba(0,0,0,0.6);
  border:2px solid #ff4dff;
  padding:1rem;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 10px #ff00ff,inset 0 0 10px #9900ff;
  flex:1 1 120px;
  min-width:100px;
}

.box div{
  font-size:2rem;
}

.box span{
  font-size:.7rem;
  color:#ccc;
  letter-spacing:2px;
}

#message{
  margin-top:2rem;
  font-size:1.3rem;
  color:#ffccff;
  text-shadow:0 0 10px #ff00ff;
  min-height:40px;
}

#revealNext{
  position:fixed;
  bottom:10px;
  right:10px;
  padding:8px 12px;
  font-family:'Orbitron',sans-serif;
  font-size:.75rem;
  color:#ffccff;
  background:rgba(255,0,255,.15);
  border:1px solid rgba(255,0,255,.4);
  border-radius:10px;
  z-index:9999;
  cursor:pointer;
}

#fireworks{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:9998;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<h1>🎂 BIRTHDAY SYSTEM 🎉</h1>

<div id="countdown">
  <div class="box"><div id="days">00</div><span>DAGAR</span></div>
  <div class="box"><div id="hours">00</div><span>TIMMAR</span></div>
  <div class="box"><div id="minutes">00</div><span>MIN</span></div>
  <div class="box"><div id="seconds">00</div><span>SEK</span></div>
</div>

<div id="message"></div>

<button id="revealNext">REVEAL NEXT</button>

<script>

const friends = [
  { name:"Ludvig", month:1, day:31 },
  { name:"Pontus", month:4, day:10 },
  { name:"Philip", month:3, day:11 },
  { name:"Daniel", month:6, day:26 },
  { name:"Jonathan", month:7, day:29 },
  { name:"Douglas", month:5, day:19 },
  { name:"Hanno", month:2, day:15 },
  { name:"Håkan", month:5, day:8 },
  { name:"Sebastian", month:10, day:8 },
  { name:"Tony", month:6, day:7 },
  { name:"Felix", month:5, day:22 },
  { name:"Malin", month:11, day:2 },
  { name:"Nike", month:9, day:19 },
  { name:"Christoffer", month:8, day:31 },
  { name:"Roger", month:1, day:15 },
  { name:"Jim", month:10, day:30 },
  { name:"Julia", month:12, day:14 },
  { name:"Johan", month:6, day:7 },
  { name:"Charlotte", month:5, day:15 },
  { name:"Simon", month:10, day:21 }
];

function getNextEvent(now){

  const year = now.getFullYear();

  let list = friends.map(f=>{

    let d = new Date(
      year,
      f.month-1,
      f.day,
      8,15,0
    );

    if(d < now){
      d = new Date(
        year+1,
        f.month-1,
        f.day,
        8,15,0
      );
    }

    return {...f,date:d};

  });

  list.sort((a,b)=>a.date-b.date);

  const nextDate = list[0].date.getTime();

  return list.filter(
    f=>f.date.getTime()===nextDate
  );
}

function update(){

  const now = new Date();

  const todayBirthdays = friends.filter(f=>

    f.month===now.getMonth()+1 &&
    f.day===now.getDate()

  );

  if(todayBirthdays.length){

    document.getElementById("days").textContent="0";
    document.getElementById("hours").textContent="0";
    document.getElementById("minutes").textContent="0";
    document.getElementById("seconds").textContent="0";

    const names =
      todayBirthdays
      .map(f=>f.name)
      .join(" & ");

    document.getElementById("message").innerHTML=
      `🎉 ${names} fyller år idag 🎂`;

    return;
  }

  const next = getNextEvent(now);

  const diff = next[0].date - now;

  document.getElementById("days").textContent =
    Math.floor(diff/86400000);

  document.getElementById("hours").textContent =
    Math.floor(diff/3600000%24);

  document.getElementById("minutes").textContent =
    Math.floor(diff/60000%60);

  document.getElementById("seconds").textContent =
    Math.floor(diff/1000%60);
}

setInterval(update,1000);
update();

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}

window.addEventListener("resize",resize);
resize();

let particles=[];

function explode(x,y){

  for(let i=0;i<80;i++){

    particles.push({
      x,
      y,
      angle:Math.random()*Math.PI*2,
      speed:Math.random()*6+2,
      alpha:1
    });

  }
}

function loop(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  particles.forEach(p=>{

    p.x+=Math.cos(p.angle)*p.speed;
    p.y+=Math.sin(p.angle)*p.speed;

    p.alpha-=0.015;

    ctx.fillStyle=
      `rgba(255,80,255,${p.alpha})`;

    ctx.fillRect(
      p.x,
      p.y,
      2,
      2
    );

  });

  particles=
    particles.filter(p=>p.alpha>0);

  requestAnimationFrame(loop);
}

loop();

document.getElementById("revealNext").onclick=function(){

  const next=getNextEvent(new Date());

  const names=
    next
    .map(f=>f.name)
    .join(" & ");

  document.getElementById("message").innerHTML=
    `🎉 ${names} är nästa som fyller år 🎂`;

  explode(
    window.innerWidth/2,
    window.innerHeight/2
  );
};

function checkBirthday(){

  const now=new Date();

  const today=friends.filter(f=>

    f.month===now.getMonth()+1 &&
    f.day===now.getDate()

  );

  if(today.length){

    explode(
      window.innerWidth/2,
      window.innerHeight/2
    );

  }
}

setInterval(checkBirthday,60000);
checkBirthday();

</script>

</body>
</html>
