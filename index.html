<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday System</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(135deg, #140014, #2a0033, #000);
    color: #fff;
    overflow: hidden;
    padding: 20px;
    text-align: center;
  }

  body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.03),
      rgba(255,255,255,0.03) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }

  h1 {
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    color: #ffccff;
    text-shadow: 0 0 5px #ff66ff, 0 0 20px #ff00ff, 0 0 40px #9900ff;
    margin-bottom: 2rem;
  }

  #countdown {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 600px;
  }

  .box {
    background: rgba(0,0,0,0.6);
    border: 2px solid #ff4dff;
    padding: 1rem;
    border-radius: 12px;
    box-shadow: 0 0 10px #ff00ff, inset 0 0 10px #9900ff;
    flex: 1 1 120px;
    min-width: 100px;
  }

  .box div {
    font-size: 2rem;
  }

  .box span {
    font-size: 0.7rem;
    color: #ccc;
    letter-spacing: 2px;
  }

  #message {
    margin-top: 2rem;
    font-size: 1.3rem;
    color: #ffccff;
    text-shadow: 0 0 10px #ff00ff;
    min-height: 40px;
  }

  /* 🔘 KNAPP LÄNGS NERE I HÖRNET */
  #debugReveal {
    position: fixed;
    bottom: 10px;
    right: 10px;

    padding: 6px 10px;
    font-size: 10px;

    color: #ffccff;
    background: rgba(255, 0, 255, 0.15);
    border: 1px solid rgba(255, 0, 255, 0.3);
    border-radius: 8px;

    z-index: 999999;
    cursor: pointer;
  }

  #debugReveal:hover {
    background: rgba(255, 0, 255, 0.25);
  }
  </style>
</head>

<body>

<h1>🎂 BIRTHDAY SYSTEM 🎉</h1>

<div id="countdown">
  <div class="box"><div id="days">00</div><span>DAGAR</span></div>
  <div class="box"><div id="hours">00</div><span>TIMMAR</span></div>
  <div class="box"><div id="minutes">00</div><span>MIN</span></div>
  <div class="box"><div id="seconds">00</div><span>SEK</span></div>
</div>

<div id="message"></div>

<!-- 🔘 KNAPP -->
<button id="debugReveal" onclick="forceReveal()">DEBUG</button>

<script>
const friends = [
  { name: "Ludvig", month: 1, day: 31 },
  { name: "Pontus", month: 4, day: 10 },
  { name: "Philip", month: 3, day: 11 },
  { name: "Daniel", month: 6, day: 26 },
  { name: "Jonathan", month: 7, day: 29 },
  { name: "Douglas", month: 5, day: 19 },
  { name: "Hanno", month: 1, day: 1 },
  { name: "Håkan", month: 5, day: 8 },
  { name: "Sebastian", month: 10, day: 8 },
  { name: "Tony", month: 6, day: 7 },
  { name: "Felix", month: 5, day: 22 },
  { name: "Malin", month: 11, day: 2 },
  { name: "Nike", month: 9, day: 19 },
  { name: "Christoffer", month: 8, day: 31 },
  { name: "Simon", month: 10, day: 21 }
];

function forceReveal() {
  const now = new Date();

  const today = friends.find(f =>
    f.month === now.getMonth() + 1 &&
    f.day === now.getDate()
  );

  if (today) {
    document.getElementById("message").innerHTML =
      "🎉 " + today.name + " fyller år idag 🎂";
  }
}

function update() {
  const now = new Date();

  const next = friends.map(f => {
    let d = new Date(now.getFullYear(), f.month - 1, f.day);
    if (d < now) d = new Date(now.getFullYear() + 1, f.month - 1, f.day);
    return d;
  }).sort((a,b) => a - b)[0];

  const diff = next - now;

  document.getElementById("days").textContent = Math.floor(diff / 86400000);
  document.getElementById("hours").textContent = Math.floor(diff / 3600000 % 24);
  document.getElementById("minutes").textContent = Math.floor(diff / 60000 % 60);
  document.getElementById("seconds").textContent = Math.floor(diff / 1000 % 60);
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
